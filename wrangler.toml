name = "subscription-manager-optimized"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace配置
[[kv_namespaces]]
binding = "SUBSCRIPTIONS_KV"
id = "your-kv-id-here"

# 定时任务配置 - 每分钟检查
[triggers]
crons = ["* * * * *"]

# 环境变量（开发环境）
[vars]
NODE_ENV = "development"

# 生产环境配置
[env.production]
name = "subscription-manager-prod"
[env.production.vars]
NODE_ENV = "production"

# 测试环境配置  
[env.staging]
name = "subscription-manager-staging"
[env.staging.vars]
NODE_ENV = "staging"
